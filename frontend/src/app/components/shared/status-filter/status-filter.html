<div class="filter flex gap-3 my-2">
    <div class="status text-xs flex gap-2">
        <button (click)="getAllTransactionIn()" [ngClass]="activeFilter == 'is_in' ? 'bg-blue-500 text-white' : 'bg-zinc-300'" class="rounded-3xl py-2 px-4">In</button>
        <button (click)="getAllTransactionOut()" [ngClass]="activeFilter == 'is_out' ? 'bg-blue-500 text-white' : 'bg-zinc-300'" class="rounded-3xl py-2 px-4">Out</button>
        <button (click)="getAllTransactions()" [ngClass]="activeFilter == 'all' ? 'bg-blue-500 text-white' : 'bg-zinc-300'" class="rounded-3xl py-2 px-4">All</button>
    </div>
</div>
