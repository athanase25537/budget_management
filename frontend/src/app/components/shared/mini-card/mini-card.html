@if(myCard) {
    <div class="w-full h-full flex items-center p-4 select-none bg-white dark:bg-transparent rounded-2xl transition-colors duration-200">
        <div class="text-lg {{ myCard.iconClass }} me-4 flex items-center justify-center w-10 h-10"></div>
        
        <div class="flex flex-col min-w-0 flex-1">
            <h2 class="text-xs font-bold text-zinc-400 dark:text-slate-500 uppercase tracking-wider truncate mb-1" [title]="myCard.title">
                {{ myCard.title }}
            </h2>
            <div class="font-bold text-zinc-900 dark:text-white text-base sm:text-lg tracking-tight truncate whitespace-nowrap flex items-baseline gap-1">
               @if(isLoading()) {
                    <div class="flex justify-center items-center gap-2">
                        <span class="text-xs font-semibold text-zinc-400 dark:text-slate-500 tracking-wide">Loading...</span>
                        <div class="animate-spin rounded-full h-4 w-4 border-2 border-zinc-200 dark:border-slate-800 border-t-zinc-800 dark:border-t-slate-200"></div>
                    </div>
               }@else {
                    <p>
                        {{ myCard.amount | number:'1.2-2' }} 
                        <span class="text-xs font-bold text-zinc-400 dark:text-slate-500">MGA</span>
                </p>
               }

            </div>

        </div>
    </div>
} @else {
    <div class="w-full h-full flex items-center p-4 min-h-[80px] animate-pulse">
        <div class="w-10 h-10 rounded-xl bg-zinc-100 dark:bg-slate-800/60 me-4 shrink-0"></div>
        <div class="flex-1 space-y-2">
            <div class="h-3 bg-zinc-100 dark:bg-slate-800/60 rounded-md w-1/3"></div>
            <div class="h-5 bg-zinc-200 dark:bg-slate-700/50 rounded-md w-2/3"></div>
        </div>
    </div>
}
