<div class="w-full space-y-6">
  <div class="grid grid-cols-1 gap-6">
    
    <!-- Section : Statistiques Actuelles (Mise en valeur type Dashboard) -->
    <div class="bg-zinc-50/50 border border-zinc-100 rounded-xl p-4">
      <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-4">Statistiques actuelles</h3>
      
      <div class="space-y-3">
        <!-- Solde -->
        <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-zinc-200/60 shadow-sm">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-[#38bdf8]"></span> <!-- Couleur Solde (Ajustez l'hexa si besoin) -->
            <span class="text-sm font-medium text-zinc-600">Solde</span>
          </div>
          <span class="text-sm font-bold text-zinc-900">{{ solde$ | async }} MGA</span>
        </div>

        <!-- Dépenses -->
        <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-zinc-200/60 shadow-sm">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-[#f43f5e]"></span> <!-- Couleur Dépenses -->
            <span class="text-sm font-medium text-zinc-600">Dépenses</span>
          </div>
          <span class="text-sm font-bold text-rose-600">{{ amountOut$ | async }} MGA</span>
        </div>

        <!-- Économies -->
        <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-zinc-200/60 shadow-sm">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-[#fb923c]"></span> <!-- Couleur Économies -->
            <span class="text-sm font-medium text-zinc-600">Économies</span>
          </div>
          <span class="text-sm font-bold text-emerald-600">{{ save$ | async }} MGA</span>
        </div>
      </div>
    </div>

    <!-- Section : Contrôles de l'échelle -->
    <div>
      <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-4">Contrôles de l'échelle</h3>
      
      <div class="space-y-4">
        <!-- Valeur minimale -->
        <div>
          <label for="minValue" class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">
            Valeur minimale
          </label>
          <input 
            type="number" 
            id="minValue" 
            [(ngModel)]="minValue" 
            (ngModelChange)="updateChartScale()"
            min="0"
            class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all">
        </div>

        <!-- Valeur maximale -->
        <div>
          <label for="maxValue" class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">
            Valeur maximale
          </label>
          <input 
            type="number" 
            id="maxValue" 
            [(ngModel)]="maxValue" 
            (ngModelChange)="updateChartScale()"
            min="0"
            class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all">
        </div>

        <!-- Pas d'incrément -->
        <div>
          <label for="stepSize" class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">
            Pas d'incrément
          </label>
          <input 
            type="number" 
            id="stepSize" 
            [(ngModel)]="stepSize" 
            (ngModelChange)="updateChartScale()"
            min="100"
            class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all">
        </div>

        <!-- Bouton Reset -->
        <div class="pt-2">
          <button 
            (click)="resetScale()"
            class="w-full px-4 py-2 text-xs font-semibold rounded-lg border border-zinc-200 bg-white text-zinc-600 hover:bg-zinc-50 active:scale-95 transition-all cursor-pointer flex justify-center items-center gap-1.5">
            <i class="fa-solid fa-arrow-rotate-left text-[10px]"></i>
            Réinitialiser l'échelle
          </button>
        </div>
      </div>
    </div>
    
  </div>
</div>
