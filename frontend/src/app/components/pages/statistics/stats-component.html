<div class="w-full h-full flex flex-col md:flex-row gap-5">
    <!-- Graphique à gauche -->
    <div class="flex-1 min-w-0 bg-white border border-zinc-200 rounded-xl p-6 shadow-sm">
        <app-graph-component/>
    </div>
    
    <!-- Filtres à droite -->
    <div class="w-full md:w-[420px] bg-white border border-zinc-200 rounded-xl p-6 shadow-sm flex flex-col">
        <div class="flex items-center gap-2 mb-6 pb-4 border-b border-zinc-100">
            <div class="p-2 bg-zinc-50 text-zinc-500 rounded-lg border border-zinc-100">
                <i class="fa-solid fa-sliders text-sm"></i>
            </div>
            <h2 class="text-sm font-bold text-zinc-900 uppercase tracking-wider">Filtres & Options</h2>
        </div>
        
        <div class="flex-1">
            <app-graph-filters 
                (scaleChange)="onScaleChange($event)"
                (resetScaleEvent)="onResetScale()"
            />
        </div>
    </div>
</div>
