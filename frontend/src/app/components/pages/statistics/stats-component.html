<div class="w-full h-full flex flex-col md:flex-row gap-6">
    <div class="flex-1 min-w-0 bg-white dark:bg-slate-800/40 dark:backdrop-blur-md border border-zinc-200 dark:border-slate-700/50 rounded-2xl p-6 shadow-sm">
        <app-graph-component/>
    </div>
    
    <div class="w-full md:w-[420px] bg-white dark:bg-slate-800/40 dark:backdrop-blur-md border border-zinc-200 dark:border-slate-700/50 rounded-2xl p-6 shadow-sm flex flex-col">
        
        <div class="flex items-center gap-2.5 mb-6 pb-4 border-b border-zinc-100 dark:border-slate-800">
            <div class="p-2 bg-zinc-50 dark:bg-slate-900 text-zinc-500 dark:text-slate-400 rounded-xl border border-zinc-100 dark:border-slate-800/60">
                <i class="fa-solid fa-sliders text-sm"></i>
            </div>
            <h2 class="text-xs font-bold text-zinc-400 dark:text-slate-500 uppercase tracking-wider">Filtres & Options</h2>
        </div>
        
        <div class="flex-1">
            <app-graph-filters 
                (scaleChange)="onScaleChange($event)"
                (resetScaleEvent)="onResetScale()"
            />
        </div>
    </div>
</div>
