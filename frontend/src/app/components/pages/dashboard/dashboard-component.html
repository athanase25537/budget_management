<!-- ===== 4 Mini-cards en ligne (toutes tailles) ===== -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
  <div class="content py-2 border border-zinc-300 rounded-xl">
    <app-mini-card [myMiniCard]="amount_in"/>
  </div>
  <div class="content py-2 border border-zinc-300 rounded-xl">
    <app-mini-card [myMiniCard]="amount_out"/>
  </div>
  <div class="content py-2 border border-zinc-300 rounded-xl">
    <app-mini-card [myMiniCard]="soldeCard"/>
  </div>
  <div class="content py-2 border border-zinc-300 rounded-xl">
    <app-mini-card [myMiniCard]="economy"/>
  </div>
</div>

<!-- ===== Contenu principal 2 colonnes ===== -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

  <!-- Colonne gauche -->
  <div class="flex flex-col overflow-y-scroll gap-4">
    <div class="py-2 px-5 content flex flex-col justify-center border border-zinc-300 rounded-xl overflow-hidden">
      <h2 class="font-bold mb-2">Budget's stats</h2>
      <div class="bg-blue-50 flex-grow">
        <app-pie-component/>
      </div>
    </div>
    <div class="py-2 px-5 content rounded-xl border border-zinc-300">
      <h2 class="font-bold mb-2">Add a new transaction</h2>
      <p class="text-sm">Did you earn or spent money today ?</p>
      <p class="text-sm mb-3">Here you can add you latest transaction to help you manage it.</p>
      <app-new-transaction (openForm)="openForm($event)"/>
    </div>
  </div>

  <!-- Colonne droite -->
  <div class="flex flex-col gap-4">
    <div class="content py-2 px-5 h-full overflow-y-scroll border border-zinc-300 rounded-xl">
      <h2 class="font-bold mb-2">Transaction History</h2>
      <app-status-filter
        [transactions]="data.transactions"
        (filteredTransactions)="onFilteredTransactions($event)"
      />
      <div class="my-card overflow-y-auto rounded bg-blue-50">
        <app-transaction-item-component
          [data]="data"
          (transactionToUpdate)="onUpdateTransaction($event)"
        />
      </div>
      <a [routerLink]="['/transactions']"
         class="inline-block mt-2 rounded-[2em] px-4 py-1 border-1 border-blue-500 text-blue-500 hover:text-white hover:bg-blue-500 transition duration-500 ease-in-out">
        See all...
      </a>
    </div>
  </div>

  <app-transaction-form
    [isIn]="isIn"
    [isUpdate]="isUpdate"
    [openForm]="isOpenForm"
    (closeForm)="onCloseForm()"
    (dataOut)="onSubmit($event)"
    [transactionToUpdate]="transactionToUpdate"
  />
</div>
