<div class="rounded-2xl h-full bg-white dark:bg-slate-900/40 dark:backdrop-blur-md p-6 border border-zinc-200 dark:border-slate-800/80 shadow-sm relative flex flex-col justify-between gap-4">
    
    <div class="flex items-center gap-3">
        <h2 class="font-bold text-slate-800 dark:text-slate-200 tracking-tight text-lg">All transactions</h2>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <app-status-filter 
            [transactions]="transactions"
            (filteredTransactions)="onFilteredTransactions($event)"
        />

        <div class="flex items-center space-x-3 bg-zinc-50 dark:bg-slate-950 px-3 py-1.5 rounded-xl border border-zinc-100 dark:border-slate-800/60 shadow-sm">
            <span class="text-xs font-bold text-zinc-500 dark:text-slate-400 uppercase tracking-wider">Analysis</span>
        
            <label class="relative inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" [ngModel]="analysis" (change)="onAnalysisChange()" class="sr-only peer">
                <div class="w-10 h-5 bg-zinc-200 dark:bg-slate-800 peer-focus:outline-none rounded-full 
                            peer peer-checked:bg-blue-600 transition-all duration-300">
                </div>
                <div class="absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full shadow-sm transition-all duration-300 peer-checked:translate-x-5"></div>
            </label>
        </div>
    </div>

    <div class="overflow-y-auto flex-1 rounded-xl min-h-0">
        <app-transaction-item-component 
            [data]="data"
            (transactionToUpdate)="onUpdateTransaction($event)"
            [analysis]="analysis"
        />
    </div>

    <div class="fixed bottom-12 right-10 z-40">
        <button 
            (click)="openNewTransactionModal()"
            class="cursor-pointer flex items-center justify-center w-12 h-12 rounded-full bg-blue-600 text-white shadow-xl hover:shadow-blue-600/20 dark:hover:shadow-blue-500/10 hover:scale-105 active:scale-95 hover:bg-blue-700 transition-all duration-200 ease-in-out"
        >
            <i class="fa-solid text-lg fa-plus"></i>
        </button>
    </div>

    @if(isNewTransactionOpen) {
        <app-new-transaction
            class="fixed bottom-26 right-11 z-40 animate-in fade-in slide-in-from-bottom-3 duration-200"
            [isTypeNormal]="false"
            (openForm)="openForm($event)"/>
    }

    <app-transaction-form
        [isIn]="isIn"
        [isUpdate]="isUpdate"
        [openForm]="isOpenForm"
        (closeForm)="onCloseForm()"
        (dataOut)="onSubmit($event)"
        [transactionToUpdate]="transactionToUpdate"
    />
</div>
