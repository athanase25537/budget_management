<ng-template #modalTemplate>
  <div class="relative bg-white rounded-xl border border-zinc-100 shadow-xl w-[92%] md:w-[420px] p-6 text-zinc-800 transition-all">
    
    <button
      type="button"
      (click)="closeModal()"
      class="absolute top-4 right-4 text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 p-1.5 rounded-lg transition-colors cursor-pointer"
    >
      <i class="fa-solid fa-xmark text-base"></i>
    </button>

    @if(isUpdate()) {
      <div class="flex gap-2.5 mb-5 items-center">
        <div class="p-2 bg-zinc-100 text-zinc-700 rounded-lg">
          <i class="fa-regular fa-pen-to-square text-sm"></i>
        </div>
        <h2 class="text-base font-bold text-zinc-900">Update transaction</h2>
      </div>
    } @else {
      @if (isIn()) {
        <div class="flex gap-2.5 mb-5 items-center">
          <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg">
            <i class="fa-solid text-sm fa-money-bill-trend-up"></i>
          </div>
          <h2 class="text-base font-bold text-zinc-900">New Income</h2>
        </div>
      } @else {
        <div class="flex gap-2.5 mb-5 items-center">
          <div class="p-2 bg-rose-50 text-rose-600 rounded-lg">
            <i class="fa-solid text-sm fa-money-bill-transfer"></i>
          </div>
          <h2 class="text-base font-bold text-zinc-900">New Outcome</h2>
        </div>
      }
    }

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <div *ngIf="errorTransaction" class="flex items-start gap-2.5 bg-rose-50 border border-rose-100 text-rose-700 p-3 rounded-lg text-xs font-medium">
        <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
        <span>{{ errorMessage }}</span>
      </div>
      
      <div>
        <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">Amount</label>
        <div class="relative">
          <input
            type="number"
            formControlName="amount"
            placeholder="0.00"
            class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all"
            [class.border-rose-400]="transactionForm.get('amount')?.invalid && transactionForm.get('amount')?.touched"
          />
        </div>

        <div *ngIf="transactionForm.get('amount')?.touched" class="mt-1">
          <p *ngIf="transactionForm.get('amount')?.hasError('required')" class="text-rose-600 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-info text-[10px]"></i> Amount is required
          </p>
          <p *ngIf="transactionForm.get('amount')?.hasError('min')" class="text-rose-600 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-info text-[10px]"></i> Minimum amount is 100
          </p>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">Date</label>
        <input
          type="date"
          formControlName="date"
          class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all"
          [class.border-rose-400]="transactionForm.get('date')?.invalid && transactionForm.get('date')?.touched"
        />

        <div *ngIf="transactionForm.get('date')?.hasError('required') && transactionForm.get('date')?.touched" class="mt-1">
          <p class="text-rose-600 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-info text-[10px]"></i> Date is required
          </p>
        </div>
      </div>

      @if(isUpdate()) {
        <div>
          <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">Transaction Type</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2 px-3 py-2 border border-zinc-200 rounded-lg text-sm font-medium cursor-pointer hover:bg-zinc-50 transition-colors">
              <input
                type="radio"
                formControlName="is_in"
                [value]="true"
                class="w-4 h-4 text-zinc-900 border-zinc-300 focus:ring-zinc-900/10"
              />
              <span class="text-zinc-700">Income</span>
            </label>

            <label class="flex items-center gap-2 px-3 py-2 border border-zinc-200 rounded-lg text-sm font-medium cursor-pointer hover:bg-zinc-50 transition-colors">
              <input
                type="radio"
                formControlName="is_in"
                [value]="false"
                class="w-4 h-4 text-zinc-900 border-zinc-300 focus:ring-zinc-900/10"
              />
              <span class="text-zinc-700">Outcome</span>
            </label>
          </div>

          <div *ngIf="transactionForm.get('is_in')?.touched" class="mt-1">
            <p *ngIf="transactionForm.get('is_in')?.hasError('required')" class="text-rose-600 text-xs flex items-center gap-1">
              <i class="fa-solid fa-circle-info text-[10px]"></i> Type is required
            </p>
          </div>
        </div>
      }

      <div>
        <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">Category</label>
        <select 
          id="category" 
          formControlName="category" 
          class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all appearance-none cursor-pointer"
          [class.border-rose-400]="transactionForm.get('category')?.invalid && transactionForm.get('category')?.touched"
        >
          <option value="" disabled selected>Select a category</option>
          <option *ngFor="let category of defaultCategories$ | async" [value]="category.id">{{ category.name | titlecase }}</option>
        </select>

        <div *ngIf="transactionForm.get('category')?.hasError('required') && transactionForm.get('category')?.touched" class="mt-1">
          <p class="text-rose-600 text-xs flex items-center gap-1">
            <i class="fa-solid fa-circle-info text-[10px]"></i> Category is required
          </p>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-1.5">Reason / Note</label>
        <input
          type="text"
          formControlName="reason"
          placeholder="e.g., Grocery shopping, Salary..."
          class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 outline-none focus:border-zinc-900 focus:ring-4 focus:ring-zinc-950/5 transition-all"
        />
      </div>

      <div class="flex justify-end gap-3 pt-3 border-t border-zinc-100 mt-6">
        <button
          type="button"
          (click)="closeModal()"
          class="px-4 py-2 text-sm font-semibold rounded-lg border border-zinc-200 bg-white text-zinc-600 hover:bg-zinc-50 active:scale-95 transition-all cursor-pointer"
        >
          Cancel
        </button>
        
        <button
          type="submit"
          [disabled]="sendTransaction"
          class="min-w-[80px] px-4 py-2 text-sm font-semibold rounded-lg bg-zinc-900 text-white shadow-sm hover:bg-zinc-800 active:scale-95 disabled:opacity-70 disabled:pointer-events-none transition-all cursor-pointer flex justify-center items-center"
        >
          @if(!sendTransaction) {
            Save
          } @else {
            <div class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></div>
          }
        </button>
      </div>

    </form>
  </div>
</ng-template>
