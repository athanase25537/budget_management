<!-- Modal (géré par Angular CDK Overlay) -->
<ng-template #modalTemplate>
  <div class="relative bg-white rounded-xl shadow-lg w-[90%] md:w-[400px] p-6">
    <button
      type="button"
      (click)="closeModal()"
      class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 cursor-pointer"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
    @if(isUpdate()) {
      <div class="flex gap-2 mb-3 items-center">
        <i class="fa-regular fa-pen-to-square text-blue-500"></i>
        <h2 class="text-lg font-bold">Update transaction</h2>
      </div>
    }@else {
      @if (isIn()) {
      <div class="flex gap-2 mb-3 items-center">
        <i class="fa-solid text-xl fa-money-bill-trend-up text-green-500"></i>
        <h2 class="text-lg font-bold">Income</h2>
      </div>
      } @else {
        <div class="flex gap-2 mb-3 items-center">
          <i class="fa-solid fa-money-bill-transfer text-red-500"></i>
          <h2 class="text-lg font-bold">Outcome</h2>
        </div>
      }
    }

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
      <p *ngIf="errorTransaction" class="bg-red-100 text-red-600 p-3 rounded-md mb-5 text-sm">{{ errorMessage }}</p>
      
      <div class="mb-3">
        <label class="block text-sm mb-1 font-medium">Amount</label>
        <input
          type="number"
          formControlName="amount"
          class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p *ngIf="transactionForm.get('amount')?.hasError('required') && transactionForm.get('amount')?.touched" class="text-red-500 text-sm">
          Amount is required
        </p>

        <p *ngIf="transactionForm.get('amount')?.hasError('min') && transactionForm.get('amount')?.touched" class="text-red-500 text-sm">
          Minimum is 100
        </p>
      </div>

      <div class="mb-3">
        <label class="block text-sm mb-1 font-medium">Date</label>
        <input
          type="date"
          formControlName="date"
          class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p *ngIf="transactionForm.get('date')?.hasError('required') && transactionForm.get('date')?.touched" class="text-red-500 text-sm">
          Date is required
        </p>

      </div>

      @if(isUpdate()) {
        <div class="mb-3">
          <label class="block text-sm mb-1 font-medium">Type</label>
          <div class="flex gap-2">
            <input
              type="radio"
              formControlName="is_in"
              [value]="true"
              class="border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400"
            />
            <p>Income</p>
          </div>

          <div class="flex gap-2">
            <input
              type="radio"
              formControlName="is_in"
              [value]="false"
              class="border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400"
            />
            <p>Outcome</p>
          </div>

          <p *ngIf="transactionForm.get('is_in')?.hasError('required') && transactionForm.get('is_in')?.touched" class="text-red-500 text-sm">
            Type is required
          </p>

          <p *ngIf="transactionForm.get('is_in')?.hasError('min') && transactionForm.get('is_in')?.touched" class="text-red-500 text-sm">
            Minimum is 100
          </p>
      </div>
      }

      <div class="mb-3">
        <label class="block text-sm mb-1 font-medium">Category</label>
        <select id="category" formControlName="category" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400">
          <option value="" disabled selected>Select a category</option>
          <option *ngFor="let category of defaultCategories" [value]="category.id">{{ category.name | titlecase }}</option>
        </select>

        <p *ngIf="transactionForm.get('category')?.hasError('required') && transactionForm.get('category')?.touched" class="text-red-500 text-sm">
          Category is required
        </p>
      </div>

      <div class="mb-3">
        <label class="block text-sm mb-1 font-medium">Reason</label>
        <input
          type="text"
          formControlName="reason"
          class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400"
        />

        <p *ngIf="transactionForm.get('reason')?.hasError('required') && transactionForm.get('reason')?.touched" class="text-red-500 text-sm">
          Reason is required
        </p>
      </div>

      <div class="flex justify-end gap-2 mt-4">
        <button
          type="button"
          class="px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 transition cursor-pointer"
          (click)="closeModal()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-700 transition cursor-pointer" [disabled]="sendTransaction"
        >
        <!-- Save -->
        @if(!sendTransaction) {
          Save
        } @else {
          <div class="animate-spin rounded-full h-6 w-6 border-4 border-white border-t-transparent"></div>
        }
        
        </button>
      </div>
    </form>
  </div>
</ng-template>
